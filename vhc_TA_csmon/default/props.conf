[csmon:hostperf]
category = Structured
description = CSmon Host Performance Data (JSON)
# for UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)

# for HF|IDX
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TRUNCATE = 0
INDEXED_EXTRACTIONS = json
KV_MODE = none
TIMESTAMP_FIELDS = TIME
TIME_FORMAT = %Y-%m-%dT%H:%M:%S

[csmon:serviceperf]
category = Structured
description = CSmon Service Performance Data (JSON)
# for UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)

# for HF|IDX
LINE_BREAKER = ([\r\n]+)
